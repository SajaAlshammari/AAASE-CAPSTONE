<!DOCTYPE html>
<html>

<head>
    <title>Employment Contract</title>
</head>

<body>

<h2>Employment Contract</h2>

<p><b>Employee:</b> {{ name }}</p>

<p><b>Position:</b> {{ position }}</p>

<p><b>Salary:</b> {{ salary }}</p>

<p><b>Probation:</b> {{ probation }}</p>

<p><b>Working Hours:</b> {{ working_hours }}</p>

<p><b>Annual Leave:</b> {{ annual_leave }}</p>

<p><b>Location:</b> {{ location }}</p>

</body>

</html>
